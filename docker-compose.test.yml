services:

  # ── Backend xUnit + Moq tests (no SQL Server needed — uses in-memory DB) ──────
  api-tests:
    build:
      context: .
      dockerfile: tests/PerformanceReviewApi.Tests/Dockerfile
    # Non-zero exit code propagates the failure to the compose run exit code
    # so CI can detect failures.

  # ── Frontend Vitest tests ─────────────────────────────────────────────────────
  frontend-tests:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
